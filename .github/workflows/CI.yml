name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate config.js
        run: npm run build
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL || 'https://dummy.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'dummy-anon-key' }}

      # - name: Install Playwright browsers
      #   run: npx playwright install chromium --with-deps

      # - name: Run smoke tests
      #   run: npx playwright test --project=chromium
      #   env:
      #     BASE_URL:            http://localhost:3000
      #     TEST_FREE_EMAIL:     ${{ secrets.TEST_FREE_EMAIL || 'test-free@centa.app' }}
      #     TEST_FREE_PASS:      ${{ secrets.TEST_FREE_PASS || 'TestPass123!' }}
      #     TEST_PRO_EMAIL:      ${{ secrets.TEST_PRO_EMAIL || 'test-pro@centa.app' }}
      #     TEST_PRO_PASS:       ${{ secrets.TEST_PRO_PASS || 'TestPass123!' }}
      #     TEST_LIFETIME_EMAIL: ${{ secrets.TEST_LIFETIME_EMAIL || 'test-lifetime@centa.app' }}
      #     TEST_LIFETIME_PASS:  ${{ secrets.TEST_LIFETIME_PASS || 'TestPass123!' }}

      # - name: Upload test report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: playwright-report
      #     path: playwright-report/
      #     retention-days: 7

  tag-release:
    name: Tag Release
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release tag
        run: |
          TAG="release-$(date +'%Y%m%d-%H%M')"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
